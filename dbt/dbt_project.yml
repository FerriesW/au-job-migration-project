name: 'au_jobs_radar'
version: '0.1.0'
config-version: 2

profile: 'au_jobs_radar'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  au_jobs_radar:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

seeds:
  au_jobs_radar:
    +schema: raw
    +quote_columns: false
    occupation_lists:
      +column_types:
        anzsco_code: string
        occupation_name: string
        list_name: string
        effective_date: date
    eoi_invitations:
      +column_types:
        round_date: date
        visa_subclass: string
        anzsco_code: string
        points_cutoff: int64
        invitations_issued: int64
    anzsco_title_patterns:
      +column_types:
        priority: int64
        anzsco_code: string
        occupation_name: string
        title_pattern: string
    occupation_ceilings:
      +column_types:
        anzsco_unit_group: string
        unit_group_name: string
        tier: int64
        avg_stock: int64
        annual_ceiling: int64
        grants_py24_25: int64
        remaining_py25_26: int64
        program_year: string
        source: string
        source_url: string
        retrieved_date: date

vars:
  analysis_window_days: 30
  target_country: 'au'
